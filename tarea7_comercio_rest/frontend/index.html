<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Tarea 7 - Comercio electrónico</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/WSClient.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <main>
    <h1>Comercio electrónico</h1>

    <section id="login" class="card">
      <h2>Acceso al sistema</h2>
      <label>Email</label>
      <input type="email" id="login_email">
      <label>Contraseña</label>
      <input type="password" id="login_password">
      <div class="actions">
        <button onclick="login()">Aceptar</button>
        <button class="secondary" onclick="limpiaAlta();ver('alta_usuario')">Registro de usuario</button>
      </div>
    </section>

    <section id="alta_usuario" class="card hidden">
      <h2>Registro de usuario</h2>
      <label>Email *</label><input type="email" id="alta_email">
      <label>Contraseña *</label><input type="password" id="alta_password">
      <label>Nombre *</label><input type="text" id="alta_nombre">
      <label>Apellido paterno *</label><input type="text" id="alta_apellido_paterno">
      <label>Apellido materno</label><input type="text" id="alta_apellido_materno">
      <label>Fecha de nacimiento *</label><input type="datetime-local" id="alta_fecha_nacimiento">
      <label>Teléfono</label><input type="number" id="alta_telefono">
      <label>Género</label>
      <select id="alta_genero"><option></option><option>Masculino</option><option>Femenino</option></select>
      <label>Foto</label>
      <img id="alta_imagen" class="preview" src="/usuario_sin_foto.png" alt="Foto del usuario">
      <input type="file" onchange="readSingleFile(files, get('alta_imagen'), 'fotoUsuario')" accept="image/*">
      <div class="actions">
        <button onclick="altaUsuario()">Registrar usuario</button>
        <button class="secondary" onclick="ver('login')">Cancelar</button>
      </div>
    </section>

    <section id="menu" class="card hidden">
      <h2>Menú principal</h2>
      <div class="actions">
        <button onclick="consultaUsuario()">Perfil del usuario</button>
        <button onclick="limpiaArticulo();ver('captura_articulo')">Captura de artículo</button>
        <button onclick="ver('compra_articulos')">Compra de artículos</button>
        <button class="danger" onclick="if(confirm('¿Deseas eliminar el perfil del usuario?')) borraUsuario()">Eliminar perfil</button>
        <button class="secondary" onclick="salir()">Salir</button>
      </div>
    </section>

    <section id="consulta_usuario" class="card hidden">
      <h2>Perfil del usuario</h2>
      <label>Email *</label><input type="email" id="consulta_email">
      <label>Nueva contraseña</label><input type="password" id="consulta_password" placeholder="Opcional">
      <label>Nombre *</label><input type="text" id="consulta_nombre">
      <label>Apellido paterno *</label><input type="text" id="consulta_apellido_paterno">
      <label>Apellido materno</label><input type="text" id="consulta_apellido_materno">
      <label>Fecha de nacimiento *</label><input type="datetime-local" id="consulta_fecha_nacimiento">
      <label>Teléfono</label><input type="number" id="consulta_telefono">
      <label>Género</label>
      <select id="consulta_genero"><option></option><option>Masculino</option><option>Femenino</option></select>
      <label>Foto</label>
      <img id="consulta_imagen" class="preview" src="/usuario_sin_foto.png" alt="Foto del usuario">
      <input type="file" id="consulta_file" onchange="readSingleFile(files, get('consulta_imagen'), 'fotoUsuario')" accept="image/*">
      <div class="actions">
        <button class="secondary" onclick="quitaFotoUsuario()">Quitar foto</button>
        <button onclick="modificaUsuario()">Guardar cambios</button>
        <button class="secondary" onclick="ver('menu')">Regresar</button>
      </div>
    </section>

    <section id="captura_articulo" class="card hidden">
      <h2>Captura de artículo</h2>
      <label>Nombre del artículo *</label><input type="text" id="articulo_nombre">
      <label>Descripción *</label><textarea id="articulo_descripcion"></textarea>
      <label>Precio *</label><input type="number" step="0.01" min="0" id="articulo_precio">
      <label>Cantidad en existencia *</label><input type="number" min="0" id="articulo_cantidad">
      <label>Fotografía</label>
      <img id="articulo_imagen" class="preview" src="/usuario_sin_foto.png" alt="Foto del artículo">
      <input type="file" onchange="readSingleFile(files, get('articulo_imagen'), 'fotoArticulo')" accept="image/*">
      <div class="actions">
        <button class="success" onclick="altaArticulo()">Guardar artículo</button>
        <button class="secondary" onclick="ver('menu')">Regresar</button>
      </div>
    </section>

    <section id="compra_articulos" class="card hidden">
      <h2>Compra de artículos</h2>
      <label>Buscar por palabra</label>
      <input type="text" id="buscar_palabra" placeholder="Ejemplo: mayonesa">
      <div class="actions three">
        <button onclick="consultaArticulos()">Buscar</button>
        <button class="secondary" onclick="consultaCarrito()">Carrito de compra</button>
        <button class="secondary" onclick="ver('menu')">Regresar</button>
      </div>
      <div id="resultados_articulos" class="grid"></div>
    </section>

    <section id="carrito" class="card hidden">
      <h2>Artículos en el carrito</h2>
      <div id="resultados_carrito" class="grid"></div>
      <div id="total_carrito" class="total">Total: $0.00</div>
      <div class="actions">
        <button class="danger" onclick="if(confirm('¿Eliminar todo el carrito?')) eliminaCarrito()">Eliminar carrito</button>
        <button class="secondary" onclick="ver('compra_articulos')">Seguir comprando</button>
      </div>
    </section>
  </main>
</body>
</html>
